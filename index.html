<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evelyn Fit - V11 Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* Variables de Tema Dinámicas */
        :root { 
            --accent: #3b82f6; 
            --accent-glow: rgba(59, 130, 246, 0.5); 
            --header-bg: #2563eb;
        }
        .theme-cyber { --accent: #00ff41; --accent-glow: rgba(0, 255, 65, 0.4); --header-bg: #0a0a0a; }
        .theme-volcano { --accent: #ff4d00; --accent-glow: rgba(255, 77, 0, 0.4); --header-bg: #330c00; }
        .theme-nebula { --accent: #a855f7; --accent-glow: rgba(168, 85, 247, 0.4); --header-bg: #2e1065; }

        .tab-active { border-bottom: 4px solid var(--accent); color: var(--accent); font-weight: bold; }
        .hidden { display: none !important; }
        .modal-active { display: flex !important; }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .bg-dashed { border: 2px dashed #CBD5E1; border-radius: 24px; transition: all 0.3s; }
        .mood-btn { transition: all 0.2s; filter: grayscale(100%); opacity: 0.5; cursor: pointer; border: none; background: none; }
        .mood-active { filter: grayscale(0%); opacity: 1; transform: scale(1.3); }
        .ai-glow { box-shadow: 0 0 15px var(--accent-glow); border: 1px solid rgba(255,255,255,0.2); }
        
        .bg-accent { background-color: var(--accent) !important; }
        .text-accent { color: var(--accent) !important; }
        .border-accent { border-color: var(--accent) !important; }
        .bg-header { background-color: var(--header-bg); transition: background-color 0.5s; }

        /* Animación Anillo de Agua */
        #water-ring { transition: stroke-dashoffset 1s ease-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 pb-24 font-sans transition-colors duration-500">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 p-6">
        <div class="bg-white p-8 rounded-[40px] shadow-2xl max-w-sm w-full text-center">
            <h1 class="text-3xl font-black italic text-blue-600 mb-8 uppercase tracking-tighter">EVELYN <span class="text-slate-800">FIT</span></h1>
            <p class="text-slate-400 text-[10px] mb-8 font-black uppercase tracking-[0.2em]">Tu evolución personal</p>
            <button id="btn-login" class="w-full bg-slate-900 text-white py-4 rounded-3xl font-black active:scale-95 transition-all shadow-xl">Entrar con Google</button>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header class="bg-header text-white p-5 sticky top-0 z-30 shadow-md flex justify-between items-center">
            <h1 class="text-xl font-black italic uppercase tracking-tighter">EVELYN <span class="opacity-70">FIT</span></h1>
            <div class="flex gap-3 items-center">
                <div class="flex gap-1 bg-black/20 p-1 rounded-full border border-white/10">
                    <button onclick="setTheme('default')" class="w-4 h-4 rounded-full bg-blue-500 border border-white/40"></button>
                    <button onclick="setTheme('cyber')" class="w-4 h-4 rounded-full bg-green-500 border border-white/40"></button>
                    <button onclick="setTheme('volcano')" class="w-4 h-4 rounded-full bg-orange-600 border border-white/40"></button>
                    <button onclick="setTheme('nebula')" class="w-4 h-4 rounded-full bg-purple-500 border border-white/40"></button>
                </div>
                <div class="bg-black/20 px-3 py-1.5 rounded-full flex items-center gap-1">
                    <span class="text-sm">🔥</span><span id="streak-count" class="text-[11px] font-black">0</span>
                </div>
                <button id="btn-logout" class="text-[10px] font-black opacity-60 uppercase">✕</button>
            </div>
        </header>

        <nav class="bg-white border-b sticky top-[68px] z-20 shadow-sm flex overflow-x-auto no-scrollbar">
            <button onclick="switchTab('inicio')" id="tab-inicio" class="flex-1 min-w-[80px] py-4 text-[9px] uppercase font-black tab-active">Inicio</button>
            <button onclick="switchTab('rutina')" id="tab-rutina" class="flex-1 min-w-[80px] py-4 text-[9px] uppercase font-black text-slate-400">Rutina</button>
            <button onclick="switchTab('progreso')" id="tab-progreso" class="flex-1 min-w-[80px] py-4 text-[9px] uppercase font-black text-slate-400">Pesos</button>
            <button onclick="switchTab('stats')" id="tab-stats" class="flex-1 min-w-[80px] py-4 text-[9px] uppercase font-black text-slate-400">Stats</button>
            <button onclick="switchTab('perfil')" id="tab-perfil" class="flex-1 min-w-[80px] py-4 text-[9px] uppercase font-black text-slate-400">Perfil</button>
        </nav>

        <main class="max-w-4xl mx-auto p-4 space-y-6">
            <section id="sec-inicio" class="space-y-6">
                <div class="bg-header p-8 rounded-[40px] text-white ai-glow space-y-4 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10">
                        <svg class="w-24 h-24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L14.85 8.65L22 9.25L16.5 13.9L18.1 21L12 17.27L5.9 21L7.5 13.9L2 9.25L9.15 8.65L12 2Z"/></svg>
                    </div>
                    <div class="flex items-center gap-2 opacity-80 uppercase font-black text-[9px] tracking-widest">✨ Coach Personal</div>
                    <p id="ai-advice" class="text-base font-medium italic leading-snug">"Analizando tus últimos entrenos..."</p>
                    <button onclick="generarConsejoIA()" id="btn-ia" class="w-full bg-white text-slate-900 py-4 rounded-2xl text-[10px] font-black uppercase shadow-xl active:scale-95 transition-all">Analizar mi progreso ⚡</button>
                </div>

                <div class="bg-white p-8 rounded-[40px] border shadow-sm text-center">
                    <p class="text-[9px] font-black uppercase text-slate-400 tracking-widest mb-6">Estado Mental</p>
                    <div class="flex justify-around text-4xl mb-4">
                        <button onclick="setMood('😢')" id="mood-😢" class="mood-btn">😢</button>
                        <button onclick="setMood('😐')" id="mood-😐" class="mood-btn">😐</button>
                        <button onclick="setMood('🙂')" id="mood-🙂" class="mood-btn">🙂</button>
                        <button onclick="setMood('🔥')" id="mood-🔥" class="mood-btn">🔥</button>
                    </div>
                    <p id="mood-phrase" class="text-[10px] font-black text-accent italic uppercase tracking-tighter px-4"></p>
                </div>

                <div class="bg-white p-8 rounded-[40px] border shadow-sm text-center">
                    <div class="relative flex items-center justify-center w-40 h-40 mx-auto mb-6">
                        <svg class="w-full h-full transform -rotate-90">
                            <circle cx="80" cy="80" r="70" stroke="currentColor" stroke-width="12" fill="transparent" class="text-slate-50" />
                            <circle id="water-ring" cx="80" cy="80" r="70" stroke="currentColor" stroke-width="12" fill="transparent" stroke-dasharray="439.8" stroke-dashoffset="439.8" stroke-linecap="round" class="text-accent" />
                        </svg>
                        <div class="absolute flex flex-col items-center">
                            <p id="water-percent" class="text-3xl font-black tracking-tighter">0%</p>
                            <p id="water-count" class="text-[9px] font-black uppercase text-slate-400">0ml</p>
                        </div>
                    </div>
                    <div class="flex gap-2 justify-center">
                        <button onclick="updateHabitDetail('agua', 250)" class="bg-accent/10 text-accent px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-sm">+250ml</button>
                        <button onclick="customAdd('agua')" class="bg-slate-50 text-slate-400 p-3 rounded-2xl border">✎</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white p-6 rounded-[35px] border shadow-sm space-y-4">
                        <div class="flex justify-between font-black text-[9px] uppercase"><span>🍗 Proteína</span><span id="prote-count">0/0g</span></div>
                        <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden"><div id="prote-bar" class="h-full bg-orange-500 transition-all duration-700"></div></div>
                        <button onclick="updateHabitDetail('prote', 20)" class="w-full bg-orange-50 text-orange-600 py-3 rounded-xl font-black text-[9px] uppercase">+20g</button>
                    </div>
                    <div class="bg-white p-6 rounded-[35px] border shadow-sm space-y-4">
                        <div class="flex justify-between font-black text-[9px] uppercase"><span>⚡ Creatina</span><span id="crea-count">0/0g</span></div>
                        <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden"><div id="crea-bar" class="h-full bg-purple-500 transition-all duration-700"></div></div>
                        <button onclick="updateHabitDetail('crea', 5)" class="w-full bg-purple-50 text-purple-600 py-3 rounded-xl font-black text-[9px] uppercase">+5g</button>
                    </div>
                </div>
            </section>

            <section id="sec-rutina" class="hidden space-y-4">
                <div id="rutina-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                <button onclick="addNewDay()" class="w-full bg-dashed py-10 text-slate-400 font-black text-[10px] uppercase">+ Añadir Día</button>
            </section>

            <section id="sec-progreso" class="hidden space-y-6">
                <div class="bg-white p-4 rounded-3xl border shadow-sm sticky top-[135px] z-10">
                    <select id="day-selector" onchange="actualizarTablaPesos()" class="w-full p-4 bg-slate-50 border-none rounded-2xl font-black text-xs outline-none"></select>
                </div>
                <div id="diario-container" class="space-y-4 pb-24"></div>
                <div class="fixed bottom-24 left-4 right-4 max-w-4xl mx-auto">
                    <button onclick="startFocusMode()" class="w-full bg-slate-900 text-white py-6 rounded-[30px] font-black text-sm uppercase shadow-2xl">Modo Focus 🎯</button>
                </div>
            </section>

            <section id="sec-stats" class="hidden space-y-6">
                <div class="bg-white p-8 rounded-[40px] border shadow-sm">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-black text-xs uppercase text-slate-400">Fuerza PR</h3>
                        <select id="chart-exercise-selector" onchange="actualizarGraficaFuerza()" class="text-[10px] font-black uppercase text-accent bg-accent/10 px-3 py-1.5 rounded-xl border border-accent/20 outline-none"></select>
                    </div>
                    <div class="h-64"><canvas id="fuerzaChart"></canvas></div>
                </div>
                
                <div class="bg-white p-8 rounded-[40px] border shadow-sm space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="font-black text-xs uppercase text-slate-400 tracking-widest">Antropometría</h3>
                        <button onclick="saveMedidasHistorial()" class="bg-accent text-white text-[9px] font-black px-4 py-2 rounded-full uppercase">Guardar hoy</button>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-slate-50 p-4 rounded-3xl"><label class="text-[8px] font-black text-slate-400 uppercase">Peso (kg)</label><input type="number" id="med-peso" step="0.1" class="w-full bg-transparent font-black text-sm mt-1 outline-none"></div>
                        <div class="bg-slate-50 p-4 rounded-3xl"><label class="text-[8px] font-black text-slate-400 uppercase">Cintura (cm)</label><input type="number" id="med-cintura" class="w-full bg-transparent font-black text-sm mt-1 outline-none"></div>
                    </div>
                </div>
            </section>

            <section id="sec-perfil" class="hidden space-y-6">
                <div class="bg-white p-10 rounded-[45px] border shadow-sm text-center space-y-6">
                    <img id="profile-img" src="" class="w-24 h-24 mx-auto rounded-[35px] border-4 border-accent shadow-xl object-cover">
                    <h2 id="profile-name" class="font-black text-xl text-slate-800 tracking-tighter">--</h2>
                    
                    <div class="bg-slate-50 p-6 rounded-[35px] grid grid-cols-2 gap-3">
                        <button onclick="exportarExcelReal()" class="bg-white p-4 rounded-2xl border font-black text-[10px] uppercase text-green-600">📥 Exportar</button>
                        <label class="bg-white p-4 rounded-2xl border font-black text-[10px] uppercase text-blue-600 cursor-pointer">📤 Importar <input type="file" class="hidden" onchange="importarExcelReal(event)"></label>
                    </div>

                    <div class="grid grid-cols-3 gap-2">
                        <div class="bg-slate-50 p-4 rounded-3xl"><label class="text-[8px] font-black text-slate-400 uppercase">Agua</label><input type="number" id="target-agua" class="w-full bg-transparent text-center font-black text-sm mt-1 outline-none"></div>
                        <div class="bg-slate-50 p-4 rounded-3xl"><label class="text-[8px] font-black text-slate-400 uppercase">Prote</label><input type="number" id="target-prote" class="w-full bg-transparent text-center font-black text-sm mt-1 outline-none"></div>
                        <div class="bg-slate-50 p-4 rounded-3xl"><label class="text-[8px] font-black text-slate-400 uppercase">Crea</label><input type="number" id="target-crea" class="w-full bg-transparent text-center font-black text-sm mt-1 outline-none"></div>
                    </div>
                    <button onclick="saveProfile()" class="w-full bg-accent text-white font-black py-5 rounded-3xl text-xs uppercase shadow-accent">Guardar Cambios</button>
                </div>
            </section>
        </main>
    </div>

    <div id="edit-modal" class="fixed inset-0 z-[60] bg-slate-900/60 backdrop-blur-md hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[45px] p-8 flex flex-col max-h-[90vh]">
            <input id="edit-enfoque" type="text" class="text-2xl font-black text-accent uppercase outline-none mb-6">
            <div id="edit-list-container" class="space-y-3 overflow-y-auto mb-6 pr-2"></div>
            <div class="flex gap-3 mt-auto">
                <button onclick="addExerciseField()" class="bg-slate-100 p-5 rounded-3xl font-black text-[10px] uppercase">＋ EJ</button>
                <button onclick="saveRoutineChange()" class="flex-1 bg-accent text-white font-black py-5 rounded-3xl text-[10px] uppercase shadow-lg">Guardar Rutina</button>
                <button onclick="deleteCurrentDay()" class="bg-red-50 text-red-400 p-5 rounded-3xl">✕</button>
            </div>
        </div>
    </div>

    <div id="focus-modal" class="fixed inset-0 bg-white z-[100] hidden flex flex-col p-8">
        <div class="flex justify-between items-center mb-8">
            <p id="focus-index" class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em]"></p>
            <button onclick="closeFocusMode()" class="text-red-400 font-black text-xs uppercase tracking-widest">Cerrar</button>
        </div>
        <div class="flex-1 flex flex-col justify-center text-center space-y-12">
            <h2 id="focus-title" class="text-4xl font-black uppercase text-slate-800 italic tracking-tighter"></h2>
            <div class="space-y-6">
                <div class="relative">
                    <span class="absolute left-6 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-300 uppercase">Kg</span>
                    <input type="number" id="focus-input-w" class="w-full bg-slate-100 p-10 rounded-[40px] text-6xl font-black text-center outline-none focus:ring-4 focus:ring-accent/20 transition-all">
                </div>
                <div class="relative">
                    <span class="absolute left-6 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-300 uppercase">Reps</span>
                    <input type="number" id="focus-input-r" class="w-full bg-slate-100 p-10 rounded-[40px] text-6xl font-black text-center outline-none focus:ring-4 focus:ring-accent/20 transition-all">
                </div>
            </div>
        </div>
        <button onclick="nextFocusStep()" id="focus-next-btn" class="w-full bg-accent text-white py-8 rounded-[35px] font-black uppercase text-xl shadow-2xl active:scale-95 transition-all">Siguiente</button>
    </div>

    <div id="rest-timer" class="fixed inset-0 bg-slate-900/98 backdrop-blur-xl z-[110] hidden flex flex-col items-center justify-center text-white text-center p-10">
        <p class="text-xs font-black text-accent uppercase tracking-widest mb-4">Recuperación</p>
        <p id="timer-clock" class="text-[120px] font-black tracking-tighter mb-12">01:30</p>
        <button onclick="skipTimer()" class="bg-white/10 px-12 py-6 rounded-full font-black text-xs uppercase border border-white/20 tracking-widest">Saltar Descanso</button>
    </div>

<script type="module">
    // IMPORTACIONES FIREBASE (Exactamente como estaban)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBXMh4TGfCKNI2muAzo4XcGMY-6ViYS8dU", 
        authDomain: "eve-progress.firebaseapp.com", 
        projectId: "eve-progress", 
        storageBucket: "eve-progress.firebasestorage.app", 
        messagingSenderId: "444415880037", 
        appId: "1:444415880037:web:8daf63d23b8c644102cf8c" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Variables de Estado (Manteniendo tu estructura)
    let dbHistorial = {}, dbFisico = {}, rutinaData = [], currentUser = null, chartF, chartM, dayEditingIdx = null;
    let estaEscribiendo = false;
    let configPerfil = { tAgua: 2500, tProte: 150, tCrea: 5 };
    let habitosHoyGlobal = { agua: 0, prote: 0, crea: 0, mood: '' };

    // LÓGICA DE TEMAS
    window.setTheme = (theme) => {
        const body = document.body;
        body.classList.remove('theme-cyber', 'theme-volcano', 'theme-nebula');
        if (theme !== 'default') body.classList.add(`theme-${theme}`);
        localStorage.setItem('evelyn-theme', theme);
        // Actualizar gráficas si existen para que coincida el color
        if(chartF) actualizarGraficaFuerza();
    };
    if(localStorage.getItem('evelyn-theme')) setTheme(localStorage.getItem('evelyn-theme'));

    // LÓGICA DE AUTH Y SYNC (Sin cambios)
    onAuthStateChanged(auth, user => {
        if (user) {
            currentUser = user;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            document.getElementById('profile-name').innerText = user.displayName;
            document.getElementById('profile-img').src = user.photoURL;
            syncData(user.uid);
        } else {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('app-content').classList.add('hidden');
        }
    });

    document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btn-logout').onclick = () => signOut(auth);

    function syncData(uid) {
        const base = ["artifacts", "eve-progress", "users", uid, "data"];
        onSnapshot(doc(db, ...base, "perfil"), snap => {
            if(snap.exists()) {
                configPerfil = snap.data();
                document.getElementById('target-agua').value = configPerfil.tAgua;
                document.getElementById('target-prote').value = configPerfil.tProte;
                document.getElementById('target-crea').value = configPerfil.tCrea;
            }
        });
        onSnapshot(doc(db, ...base, "rutina"), snap => {
            rutinaData = snap.exists() ? snap.data().val : [];
            dibujarRutina(); updateDaySelector(); updateChartSelectors();
        });
        onSnapshot(doc(db, ...base, "historial_v4"), snap => {
            dbHistorial = snap.exists() ? snap.data().val : {};
            if(!estaEscribiendo) actualizarTablaPesos();
            calculateStreak();
        });
        onSnapshot(doc(db, ...base, "fisico_v1"), snap => { dbFisico = snap.exists() ? snap.data().val : {}; });
        onSnapshot(doc(db, ...base, "habitos_v2"), snap => {
            const hoy = new Date().toLocaleDateString();
            const d = snap.exists() ? snap.data() : {};
            habitosHoyGlobal = d[hoy] || { agua: 0, prote: 0, crea: 0, mood: '' };
            renderHabits(habitosHoyGlobal);
        });
    }

    // LÓGICA DE HABITOS (NUEVO ANILLO VISUAL)
    window.renderHabits = (s) => {
        const metaAgua = configPerfil.tAgua || 2500;
        const pctAgua = Math.min((s.agua / metaAgua) * 100, 100);
        const ring = document.getElementById('water-ring');
        const offset = 439.8 - (pctAgua / 100) * 439.8;
        
        ring.style.strokeDashoffset = offset;
        document.getElementById('water-percent').innerText = `${Math.round(pctAgua)}%`;
        document.getElementById('water-count').innerText = `${s.agua}/${metaAgua}ml`;

        document.getElementById('prote-bar').style.width = `${Math.min((s.prote/(configPerfil.tProte||150))*100, 100)}%`;
        document.getElementById('prote-count').innerText = `${s.prote}/${configPerfil.tProte||150}g`;
        document.getElementById('crea-bar').style.width = `${Math.min((s.crea/(configPerfil.tCrea||5))*100, 100)}%`;
        document.getElementById('crea-count').innerText = `${s.crea}/${configPerfil.tCrea||5}g`;
        
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.toggle('mood-active', b.id === 'mood-'+s.mood));
        const frases = {'😢':"Mañana será mejor.", '😐':"Paso a paso.", '🙂':"¡Bien!", '🔥':"¡A tope!"};
        document.getElementById('mood-phrase').innerText = s.mood ? frases[s.mood] : "";
    };

    window.updateHabitDetail = async (h, a) => {
        const hoy = new Date().toLocaleDateString(), ref = doc(db, "artifacts", "eve-progress", "users", currentUser.uid, "data", "habitos_v2"), snap = await getDoc(ref);
        let d = snap.exists() ? snap.data() : {}; if(!d[hoy]) d[hoy] = { agua:0, prote:0, crea:0 };
        d[hoy][h] = (d[hoy][h] || 0) + a; await setDoc(ref, d);
    };

    window.customAdd = (h) => { const v = prompt(`¿Cuánto ${h}?`); if(v) updateHabitDetail(h, parseFloat(v)); };

    window.setMood = async (emoji) => {
        const hoy = new Date().toLocaleDateString(), ref = doc(db, "artifacts", "eve-progress", "users", currentUser.uid, "data", "habitos_v2"), snap = await getDoc(ref);
        let d = snap.exists() ? snap.data() : {}; if(!d[hoy]) d[hoy] = { agua:0, prote:0, crea:0 };
        d[hoy].mood = emoji; await setDoc(ref, d);
    };

    // LÓGICA DE RUTINA Y EXCEL (Sin cambios en estructura)
    window.dibujarRutina = () => {
        const cont = document.getElementById('rutina-container');
        cont.innerHTML = rutinaData.map((d, i) => `
            <div class="bg-white p-8 rounded-[40px] border shadow-sm cursor-pointer hover:border-accent transition-all" onclick="openEdit(${i})">
                <h3 class="font-black text-xs uppercase text-accent mb-4 tracking-tighter">${d.enfoque}</h3>
                <div class="space-y-1">${d.lista.map(ex => `<p class="text-[10px] font-bold text-slate-400">• ${ex.n}</p>`).join('')}</div>
            </div>`).join('');
    };

    window.addNewDay = () => { rutinaData.push({ enfoque: "NUEVO DÍA", lista: [] }); openEdit(rutinaData.length - 1); };
    window.openEdit = (idx) => { dayEditingIdx = idx; document.getElementById('edit-enfoque').value = rutinaData[idx].enfoque; const cont = document.getElementById('edit-list-container'); cont.innerHTML = ''; rutinaData[idx].lista.forEach(ex => addExerciseField(ex.n, ex.s, ex.r)); document.getElementById('edit-modal').classList.remove('hidden'); };
    window.addExerciseField = (n="", s=3, r=10) => { const div = document.createElement('div'); div.className = "bg-slate-50 p-4 rounded-3xl relative mb-2"; div.innerHTML = `<input type="text" class="ex-n w-full bg-transparent text-[11px] font-black uppercase outline-none mb-2" value="${n}"><div class="grid grid-cols-2 gap-2"><input type="number" class="ex-s w-full bg-white p-2 rounded-xl text-xs font-bold" value="${s}"><input type="number" class="ex-r w-full bg-white p-2 rounded-xl text-xs font-bold" value="${r}"></div><button onclick="this.parentElement.remove()" class="absolute -top-1 -right-1 bg-white rounded-full p-2 text-red-300 shadow-sm">✕</button>`; document.getElementById('edit-list-container').appendChild(div); };
    window.saveRoutineChange = async () => { const ns = Array.from(document.querySelectorAll('.ex-n')), ss = Array.from(document.querySelectorAll('.ex-s')), rs = Array.from(document.querySelectorAll('.ex-r')); rutinaData[dayEditingIdx].enfoque = document.getElementById('edit-enfoque').value.toUpperCase(); rutinaData[dayEditingIdx].lista = ns.map((n, i) => ({ n: n.value.toUpperCase(), s: parseInt(ss[i].value), r: parseInt(rs[i].value) })).filter(x => x.n); await setDoc(doc(db, "artifacts", "eve-progress", "users", currentUser.uid, "data", "rutina"), { val: rutinaData }); document.getElementById('edit-modal').classList.add('hidden'); };
    window.deleteCurrentDay = async () => { if(confirm("¿Borrar?")) { rutinaData.splice(dayEditingIdx, 1); await setDoc(doc(db, "artifacts", "eve-progress", "users", currentUser.uid, "data", "rutina"), { val: rutinaData }); document.getElementById('edit-modal').classList.add('hidden'); } };

    // LÓGICA DE EXCEL (Copiada de tu V10)
    window.exportarExcelReal = () => {
        const d = []; rutinaData.forEach(dia => dia.lista.forEach(ex => d.push({"Día": dia.enfoque, "Ejercicio": ex.n, "Series": ex.s, "Reps": ex.r})));
        const ws = XLSX.utils.json_to_sheet(d); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Rutina"); XLSX.writeFile(wb, "Rutina_Evelyn.xlsx");
    };
    window.importarExcelReal = (e) => {
        const file = e.target.files[0]; const reader = new FileReader();
        reader.onload = async (ev) => {
            const data = new Uint8Array(ev.target.result); const wb = XLSX.read(data, {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            const map = {}; rows.forEach(r => { if(!map[r.Día]) map[r.Día] = {enfoque: r.Día, lista: []}; map[r.Día].lista.push({n: r.Ejercicio, s: r.Series, r: r.Reps}); });
            rutinaData = Object.values(map); await setDoc(doc(db, "artifacts", "eve-progress", "users", currentUser.uid, "data", "rutina"), {val: rutinaData});
        }; reader.readAsArrayBuffer(file);
    };

    // LÓGICA DE PESOS Y MODO FOCUS (Con inputs Premium)
    window.updateDaySelector = () => { const s = document.getElementById('day-selector'); if(s) { s.innerHTML = rutinaData.map(d => `<option value="${d.enfoque}">${d.enfoque}</option>`).join(''); actualizarTablaPesos(); } };
    window.actualizarTablaPesos = () => { 
        const enf = document.getElementById('day-selector').value, dia = rutinaData.find(d => d.enfoque === enf), cont = document.getElementById('diario-container'), hoy = new Date().toLocaleDateString(); 
        if(!dia || !cont) return; 
        cont.innerHTML = dia.lista.map(ex => { 
            const reg = (dbHistorial[ex.n] || []).find(r => r.fecha === hoy) || { series: [] }; 
            let sHtml = ''; for(let i=0; i<ex.s; i++) { const sD = reg.series[i] || { p: 0, r: 0 }; sHtml += `<div class="grid grid-cols-3 gap-2 mb-2 items-center"><span class="text-[9px] font-black text-slate-300">S${i+1}</span><input type="number" onfocus="estaEscribiendo=true" onblur="estaEscribiendo=false" oninput="guardarPesoSerie('${ex.n}', ${i}, 'p', this.value)" value="${sD.p || ''}" class="bg-slate-50 p-3 rounded-xl text-center text-xs font-black outline-none"><input type="number" onfocus="estaEscribiendo=true" onblur="estaEscribiendo=false" oninput="guardarPesoSerie('${ex.n}', ${i}, 'r', this.value)" value="${sD.r || ''}" class="bg-slate-50 p-3 rounded-xl text-center text-xs font-black outline-none"></div>`; } 
            return `<div class="bg-white p-6 rounded-[35px] border shadow-sm"><p class="font-black text-[11px] uppercase text-accent mb-4 italic tracking-tighter">${ex.n}</p>${sHtml}</div>`; 
        }).join(''); 
    };

    window.guardarPesoSerie = async (ej, sIdx, campo, valor) => { 
        const hoy = new Date().toLocaleDateString(); if(!dbHistorial[ej]) dbHistorial[ej] = []; 
        let r = dbHistorial[ej].find(x => x.fecha === hoy); if(!r) { r = { fecha: hoy, timestamp: Date.now(), series: [] }; dbHistorial[ej].push(r); } 
        if(!r.series[sIdx]) r.series[sIdx] = { p: 0, r: 0 }; r.series[sIdx][campo] = parseFloat(valor) || 0; 
        await setDoc(doc(db, "artifacts", "eve-progress", "users", currentUser.uid, "data", "historial_v4"), { val: dbHistorial }); 
    };

    // MODO FOCUS (Lógica paso a paso)
    let fExIdx = 0, fSerIdx = 0, fList = [], tInt;
    window.startFocusMode = () => { 
        const dia = rutinaData.find(d => d.enfoque === document.getElementById('day-selector').value); 
        if(!dia || dia.lista.length === 0) return alert("Error"); 
        fList = dia.lista; fExIdx = 0; fSerIdx = 0; updateFocusUI(); document.getElementById('focus-modal').classList.remove('hidden'); 
    };
    function updateFocusUI() { 
        const ex = fList[fExIdx], hoy = new Date().toLocaleDateString(), reg = (dbHistorial[ex.n] || []).find(r => r.fecha === hoy) || { series: [] }, sD = reg.series[fSerIdx] || { p: '', r: '' }; 
        document.getElementById('focus-index').innerText = `EJERCICIO ${fExIdx + 1}/${fList.length} • SERIE ${fSerIdx + 1}/${ex.s}`; 
        document.getElementById('focus-title').innerText = ex.n; document.getElementById('focus-input-w').value = sD.p; document.getElementById('focus-input-r').value = sD.r; 
        document.getElementById('focus-next-btn').innerText = (fExIdx === fList.length - 1 && fSerIdx === ex.s - 1) ? "FINALIZAR" : "COMPLETAR SERIE"; 
    }
    window.nextFocusStep = async () => { 
        const ex = fList[fExIdx]; await guardarPesoSerie(ex.n, fSerIdx, 'p', document.getElementById('focus-input-w').value); await guardarPesoSerie(ex.n, fSerIdx, 'r', document.getElementById('focus-input-r').value); 
        if (fExIdx === fList.length - 1 && fSerIdx === ex.s - 1) { closeFocusMode(); return; } 
        if (fSerIdx < ex.s - 1) fSerIdx++; else { fExIdx++; fSerIdx = 0; } startRestTimer(); updateFocusUI(); 
    };
    function startRestTimer() { 
        document.getElementById('rest-timer').classList.remove('hidden'); let time = 90; clearInterval(tInt); 
        tInt = setInterval(() => { 
            time--; document.getElementById('timer-clock').innerText = `${Math.floor(time/60)}:${(time%60).toString().padStart(2,'0')}`; 
            if(time <= 0) skipTimer(); 
        }, 1000); 
    }
    window.skipTimer = () => { clearInterval(tInt); document.getElementById('rest-timer').classList.add('hidden'); };
    window.closeFocusMode = () => { document.getElementById('focus-modal').classList.add('hidden'); location.reload(); };

    // STATS Y GRÁFICAS (Adaptadas al color del tema)
    function updateChartSelectors() {
        const s = document.getElementById('chart-exercise-selector');
        let all = []; rutinaData.forEach(d => d.lista.forEach(e => all.push(e.n)));
        all = [...new Set(all)]; s.innerHTML = all.map(e => `<option value="${e}">${e}</option>`).join('');
    }
    window.actualizarGraficaFuerza = () => {
        const ej = document.getElementById('chart-exercise-selector').value;
        if(!ej || !dbHistorial[ej]) return;
        const color = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
        const data = dbHistorial[ej].map(h => ({ x: h.fecha, y: Math.max(...h.series.map(s => s.p || 0)) })).slice(-7);
        if(chartF) chartF.destroy();
        chartF = new Chart(document.getElementById('fuerzaChart'), {
            type: 'line',
            data: { labels: data.map(d => d.x), datasets: [{ data: data.map(d => d.y), borderColor: color, backgroundColor: color+'22', fill: true, tension: 0.4 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    };

    // IA COACH (Conectado a Vercel)
    window.generarConsejoIA = async () => {
        const btn = document.getElementById('btn-ia'); const adv = document.getElementById('ai-advice');
        btn.innerText = "🧠 ESCANEANDO..."; btn.disabled = true;
        try {
            const h = habitosHoyGlobal;
            const res = await fetch("https://evelyn-fitness.vercel.app/api/coach", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: [{ role: "system", content: "Coach Fitness. 12 palabras." }, { role: "user", content: `Agua:${h.agua}ml, Prote:${h.prote}g.` }] })
            });
            const data = await res.json(); adv.innerText = data.choices[0].message.content;
        } catch (e) { adv.innerText = "¡Sigue entrenando duro!"; }
        finally { btn.innerText = "Analizar mi progreso ⚡"; btn.disabled = false; }
    };

    // PERFIL Y OTROS
    window.saveProfile = async () => {
        configPerfil.tAgua = parseInt(document.getElementById('target-agua').value);
        configPerfil.tProte = parseInt(document.getElementById('target-prote').value);
        configPerfil.tCrea = parseInt(document.getElementById('target-crea').value);
        await setDoc(doc(db, "artifacts", "eve-progress", "users", currentUser.uid, "data", "perfil"), configPerfil);
        alert("Guardado");
    };

    window.saveMedidasHistorial = async () => {
        const hoy = new Date().toLocaleDateString();
        dbFisico[hoy] = { peso: parseFloat(document.getElementById('med-peso').value), cintura: parseFloat(document.getElementById('med-cintura').value) };
        await setDoc(doc(db, "artifacts", "eve-progress", "users", currentUser.uid, "data", "fisico_v1"), { val: dbFisico });
        alert("Medidas guardadas");
    };

    function calculateStreak() {
        let dates = []; Object.values(dbHistorial).forEach(ex => ex.forEach(r => dates.push(r.fecha)));
        document.getElementById('streak-count').innerText = [...new Set(dates)].length;
    }

    window.switchTab = (t) => {
        ['inicio','rutina','progreso','stats','perfil'].forEach(s => {
            document.getElementById('sec-'+s).classList.toggle('hidden', s !== t);
            document.getElementById('tab-'+s).classList.toggle('tab-active', s === t);
        });
        if(t === 'stats') { updateChartSelectors(); setTimeout(actualizarGraficaFuerza, 100); }
    };

</script>
</body>
</html>
